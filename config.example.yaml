# config.yaml 작성용 예시. 이 파일을 config.yaml 로 복사해서 값을 채우세요.
#   cp config.example.yaml config.yaml
#
# 비밀 값(서비스 키, 액세스 토큰)은 파일 대신 환경변수로 주입하는 것을 권장합니다.
#   export BUS_API__SERVICE_KEY="..."
#   export KAKAO__ACCESS_TOKEN="..."

station_id: "123456"       # 인천 정류장 ID

routes:                    # 알림 받을 노선 번호
  - "17"
  - "43"

check_interval: 60         # 조회 주기(초)
notify_minutes: 10         # 도착 n분 이하이면 알림
notify_stations: 3         # 남은 정류장 n개 이하이면 알림 (null 이면 미사용)

bus_api:
  base_url: "http://apis.data.go.kr/6280000/busArrivalService"
  endpoint: "/getAllRouteBusArrivalList"
  service_key: "YOUR_DATA_GO_KR_SERVICE_KEY"
  timeout: 10
  use_mock: false

kakao:
  access_token: "YOUR_KAKAO_ACCESS_TOKEN"
  dry_run: false
  # 카카오맵 JavaScript 키(지도용). 비우면 지도는 Leaflet+OSM 으로 폴백.
  # 카카오 개발자 콘솔 > 앱 키 > JavaScript 키. [플랫폼 > Web]에 http://localhost:8010 등록 필수.
  js_key: "YOUR_KAKAO_JS_KEY"

database_path: "bus_notifier.db"
dedup_ttl: 1800
log_level: "INFO"

# 상세화면 지도의 실시간 버스 위치는 국토부 TAGO 버스위치정보(gpslati/gpslong)를
# 사용합니다. 위 data.go.kr 인증키(계정 단위 공용)로 아래 두 서비스를 활용신청하세요.
#   - 국토교통부_(TAGO)_버스위치정보 (data 15098533, BusLcInfoInqireService)
#   - 국토교통부_(TAGO)_버스노선정보 (data 15098529, BusRouteInfoInqireService)
# 미승인/장애 시 자동으로 정류소 좌표(스냅) 표시로 폴백합니다.
# tago_enabled: true       # false 로 두면 TAGO 조회를 끄고 정류소 스냅만 사용
# tago_city_code: "23"     # 인천
# tago_route_prefix: "ICB" # TAGO 인천 routeId = ICB + 인천 ROUTEID
